spring:
  application:
    name: mirems-core-api
  mvc:
    problemdetails:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${MIREMS_KEYCLOAK_ISSUER_URI:${MIREMS_KEYCLOAK_URL:http://localhost:8081}/realms/${MIREMS_KEYCLOAK_REALM:mirems}}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

mirems:
  security:
    rate-limit:
      enabled: ${MIREMS_RATE_LIMIT_ENABLED:true}
      capacity: ${MIREMS_RATE_LIMIT_CAPACITY:60}
      refill-tokens: ${MIREMS_RATE_LIMIT_REFILL_TOKENS:60}
      refill-period: ${MIREMS_RATE_LIMIT_REFILL_PERIOD:PT1M}
    cors:
      frontend-origin: ${MIREMS_FRONTEND_ORIGIN:http://localhost:5173}
      prod-allowed-origins: ${MIREMS_PROD_ALLOWED_ORIGINS:}

kogito:
  service:
    url: ${MIREMS_KOGITO_SERVICE_URL:http://localhost:8080}
  data-index:
    url: ${MIREMS_KOGITO_DATAINDEX_URL:http://localhost:8180}
  management-console:
    url: ${MIREMS_KOGITO_MANAGEMENT_CONSOLE_URL:http://localhost:8280}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: MiREMS Platform Core API
    version: 0.1.0-SNAPSHOT
    standard: NIST VVSG 2.0 aligned traceability baseline

server:
  servlet:
    context-path: /miremsplatform
  error:
    include-message: never
    include-binding-errors: never
