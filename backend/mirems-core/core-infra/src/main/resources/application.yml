spring:
  application:
    name: mirems-core-api
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: MiREMS Platform Core API
    version: 0.1.0-SNAPSHOT
    standard: NIST VVSG 2.0 aligned traceability baseline

server:
  error:
    include-message: never
    include-binding-errors: never
