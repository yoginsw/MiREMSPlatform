{{- if not .Values.coreApi.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mirems-platform.coreApiSecretName" . }}
  labels:
    {{- include "mirems-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  MIREMS_DB_PASS: {{ required "coreApi.secrets.MIREMS_DB_PASS or coreApi.secrets.existingSecret is required" .Values.coreApi.secrets.MIREMS_DB_PASS | quote }}
  MIREMS_ENCRYPTION_KEY: {{ required "coreApi.secrets.MIREMS_ENCRYPTION_KEY or coreApi.secrets.existingSecret is required" .Values.coreApi.secrets.MIREMS_ENCRYPTION_KEY | quote }}
{{- end }}
