name: mirems-dev

services:
  postgres:
    image: postgres:16.4
    container_name: mirems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MIREMS_DB_NAME:-mirems}
      POSTGRES_USER: ${MIREMS_DB_USER:-mirems}
      POSTGRES_PASSWORD: ${MIREMS_DB_PASS:-mirems_dev_password}
      MIREMS_KEYCLOAK_DB_NAME: ${MIREMS_KEYCLOAK_DB_NAME:-keycloak}
    ports:
      - "${MIREMS_DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - mirems

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: mirems-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
      - --metrics-enabled=true
    environment:
      KEYCLOAK_ADMIN: ${MIREMS_KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${MIREMS_KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${MIREMS_KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${MIREMS_DB_USER:-mirems}
      KC_DB_PASSWORD: ${MIREMS_DB_PASS:-mirems_dev_password}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "${MIREMS_KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ../keycloak/mirems-realm.json:/opt/keycloak/data/import/mirems-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - mirems

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: mirems-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${MIREMS_KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: ${MIREMS_KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${MIREMS_KAFKA_EXTERNAL_PORT:-9094}:9094"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - mirems

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mirems-kafka-ui
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: mirems-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      SERVER_PORT: 8080
    ports:
      - "${MIREMS_KAFKA_UI_PORT:-8082}:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - mirems

  kogito-management-console:
    image: quay.io/kiegroup/kogito-management-console:10.2.0
    container_name: mirems-kogito-management-console
    restart: unless-stopped
    profiles:
      - kogito
    environment:
      KOGITO_DATAINDEX_HTTP_URL: ${MIREMS_KOGITO_DATAINDEX_URL:-http://localhost:8180}
      KOGITO_MANAGEMENT_CONSOLE_PROPS: -Dkogito.consoles.keycloak.config.url=${MIREMS_KEYCLOAK_URL:-http://localhost:8081}
    ports:
      - "${MIREMS_KOGITO_CONSOLE_PORT:-8280}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - mirems

volumes:
  pg_data:
  kafka_data:

networks:
  mirems:
    driver: bridge
