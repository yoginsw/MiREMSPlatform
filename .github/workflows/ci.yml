name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Corretto 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and test backend
        run: ./gradlew build test --no-daemon

  frontend-build:
    name: Frontend build, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend workspace
        run: pnpm -r build

      - name: Lint frontend workspace
        run: pnpm -r lint

      - name: Test frontend workspace
        run: pnpm -r test

  coverage-check:
    name: Coverage gate placeholder
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
    timeout-minutes: 5

    steps:
      - name: Document staged coverage policy
        run: |
          echo "Coverage gate is intentionally staged during scaffold phase."
          echo "Jacoco/coverage thresholds will become blocking when aggregate coverage configuration is added."

  lint:
    name: Backend lint placeholder
    runs-on: ubuntu-latest
    needs: backend-build
    timeout-minutes: 5

    steps:
      - name: Document staged backend lint policy
        run: |
          echo "Backend Checkstyle is intentionally staged during scaffold phase."
          echo "Frontend ESLint is enforced in the frontend-build job."
